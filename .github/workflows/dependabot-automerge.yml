name: Dependabot Automerge
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
permissions:
  contents: read
jobs:
  enable-automerge:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Detect workflow-file changes
        id: workflow_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if ! changed_files="$(gh pr diff "$PR_URL" --name-only)"; then
            echo "::warning::Unable to inspect PR diff; skipping automerge rather than merging without workflow-file classification."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$changed_files" | grep -Eq '^\.github/workflows/'; then
            echo "::notice::Dependabot PR changes GitHub Actions workflow files. Skipping automerge because GITHUB_TOKEN cannot update workflows; merge this PR manually with a credential that has workflow permission."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Wait for PR checks
        if: steps.workflow_changes.outputs.skip != 'true'
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          for attempt in {1..90}; do
            # Read the check rollup and the head commit in a SINGLE query so the
            # green verdict provably belongs to that exact SHA. A grouped-update
            # rebase can force-push a new head between check-validation and the
            # merge; capturing the head here lets the merge step pin to it.
            pr_json="$(gh pr view "$PR_URL" --json statusCheckRollup,headRefOid)"
            head_sha="$(printf '%s' "$pr_json" | jq -r '.headRefOid')"
            # The CodeQL code-scanning RESULTS check (the one OpenSSF Scorecard
            # keys on) surfaces in the rollup as a CheckRun named "CodeQL".
            # Require it present AND successful: otherwise "green" could be
            # declared on a head whose CodeQL result has not attached yet, and
            # the pinned merge below would faithfully merge that unscanned head.
            state="$(printf '%s' "$pr_json" | jq -r '
              [
                .statusCheckRollup[]
                | select(.workflowName != "Dependabot Automerge")
                | select(.name != "StepSecurity Optional Checks")
                | select(.name != "StepSecurity Harden-Runner")
              ] as $checks
              | ([ $checks[] | select(.name == "CodeQL") ]) as $codeql
              | if ($checks | length) == 0 then "pending"
                elif any($checks[]; .status != "COMPLETED") then "pending"
                elif ($codeql | length) == 0 then "pending"
                elif any($codeql[]; .conclusion != "SUCCESS") then "failure"
                elif all($checks[]; (.conclusion == "SUCCESS" or .conclusion == "SKIPPED" or .conclusion == "NEUTRAL")) then "success"
                else "failure"
                end
            ')"

            case "$state" in
              success)
                echo "PR checks are green for $PR_URL at ${head_sha}."
                echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              failure)
                echo "::error::One or more PR checks failed for $PR_URL; refusing automerge."
                printf '%s' "$pr_json" | jq -r '
                  .statusCheckRollup[]
                  | select(.workflowName != "Dependabot Automerge")
                  | select(.name != "StepSecurity Optional Checks")
                  | select(.name != "StepSecurity Harden-Runner")
                  | [.workflowName, .name, .status, .conclusion]
                  | @tsv
                '
                exit 1
                ;;
              pending)
                echo "Waiting for PR checks, attempt ${attempt}/90."
                sleep 10
                ;;
              *)
                echo "::error::Unexpected PR check state: $state"
                exit 1
                ;;
            esac
          done

          echo "::error::Timed out waiting for PR checks."
          exit 1

      - name: Auto-approve Dependabot PR
        if: steps.workflow_changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review "$PR_URL" --approve --body "Auto-approved Dependabot dependency update after the configured PR checks passed."

      - name: Merge PR
        if: steps.workflow_changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ steps.wait.outputs.head_sha }}
        run: |
          set -euo pipefail
          state="$(gh pr view "$PR_URL" --json state --jq '.state')"
          if [ "$state" != "OPEN" ]; then
            exit 0
          fi
          # Only merge the exact commit whose checks we validated. If a rebase
          # advanced the head since validation, defer: the synchronize event
          # from that rebase starts a fresh automerge run that re-validates the
          # new head, so an unchecked commit is never merged (and the branch is
          # left intact for that run to finish on).
          current_head="$(gh pr view "$PR_URL" --json headRefOid --jq '.headRefOid')"
          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "::notice::Head advanced from ${HEAD_SHA} to ${current_head} since validation; deferring to the fresh automerge run."
            exit 0
          fi
          # --match-head-commit is an atomic backstop for the sub-second window
          # between the check above and the merge call itself.
          gh pr merge "$PR_URL" --squash --delete-branch --match-head-commit "$HEAD_SHA"
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
