name: Auto-tag on version bump
# Organization version display convention: public tags/releases use
# vXX.XX.XX with zero-padded numeric segments. package.json keeps npm SemVer
# shape and may include prerelease labels; the display tag is derived from the
# numeric base version.
#
# Every run derives one immutable release target from trusted main history. A
# later main commit or a transient publication failure therefore cannot lose a
# version bump: queued, scheduled, and manual-main recovery runs converge on
# the first commit that introduced the still-current version. Existing tags
# remain authoritative and are never moved or deleted. Publication starts only
# after every push gate and both CodeQL SARIF categories are clean for that
# exact target SHA.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:

permissions: write-all
concurrency:
  group: auto-tag-main
  queue: max
  cancel-in-progress: false

jobs:
  auto-tag:
    name: Reconcile org-standard tag from package.json version
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Resolve the trusted main candidate
        id: trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          PAYLOAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_WORKFLOW_ID: ${{ github.event.workflow_run.workflow_id }}
          CI_WORKFLOW_ID: "275133464"
        run: |
          set -euo pipefail

          main_sha="$(
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              --jq '.object.sha'
          )"

          case "$EVENT_NAME" in
            workflow_run)
              if [ "$TRIGGER_WORKFLOW_ID" != "$CI_WORKFLOW_ID" ]; then
                echo "::error::Unexpected trigger workflow ID $TRIGGER_WORKFLOW_ID; expected $CI_WORKFLOW_ID."
                exit 1
              fi
              trigger_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/runs/$TRIGGER_RUN_ID")"
              if ! jq -e \
                --arg sha "$PAYLOAD_SHA" \
                --arg repo "$GITHUB_REPOSITORY" \
                --argjson workflow_id "$CI_WORKFLOW_ID" \
                '.workflow_id == $workflow_id and
                 .head_sha == $sha and
                 .head_branch == "main" and
                 .head_repository.full_name == $repo and
                 .event == "push" and
                 .status == "completed" and
                 .conclusion == "success"' \
                <<<"$trigger_json" >/dev/null; then
                echo "::error::The workflow_run payload is not the expected successful CI push run."
                exit 1
              fi
              candidate_sha="$PAYLOAD_SHA"
              ;;
            schedule)
              candidate_sha="$main_sha"
              ;;
            workflow_dispatch)
              if [ "$EVENT_REF" != "refs/heads/main" ]; then
                echo "::error::Manual recovery must run from refs/heads/main, got $EVENT_REF."
                exit 1
              fi
              candidate_sha="$main_sha"
              ;;
            *)
              echo "::error::Unsupported trigger $EVENT_NAME."
              exit 1
              ;;
          esac

          if [[ ! "$candidate_sha" =~ ^[0-9a-f]{40}$ ]] || [[ ! "$main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Candidate or main did not resolve to a full commit SHA."
            exit 1
          fi
          comparison="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/compare/${candidate_sha}...${main_sha}")"
          if ! jq -e --arg target "$candidate_sha" \
            '(.status == "ahead" or .status == "identical") and .merge_base_commit.sha == $target' \
            <<<"$comparison" >/dev/null; then
            echo "::error::Candidate $candidate_sha is not in current main history at $main_sha."
            exit 1
          fi

          echo "candidate_sha=$candidate_sha" >> "$GITHUB_OUTPUT"
          echo "Trusted candidate $candidate_sha is in live main history at $main_sha."

      - name: Checkout trusted candidate with full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.trigger.outputs.candidate_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js 24 for release-policy validation
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Resolve immutable release target
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANDIDATE_SHA: ${{ steps.trigger.outputs.candidate_sha }}
        run: |
          set -euo pipefail

          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "$CANDIDATE_SHA" ]; then
            echo "::error::Checkout $checked_out_sha does not match trusted candidate $CANDIDATE_SHA."
            exit 1
          fi

          VERSION="$(node -p "require('./package.json').version")"
          node scripts/release-policy.mjs validate-semver "$VERSION"
          TAG="$(node scripts/release-policy.mjs display-tag "$VERSION")"
          LEGACY_TAG="v${VERSION}"

          tag_exists() {
            local encoded_tag
            encoded_tag="$(jq -rn --arg value "$1" '$value | @uri')"
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${encoded_tag}" \
              >/dev/null 2>&1
          }

          resolve_tag_sha() {
            local encoded_tag
            encoded_tag="$(jq -rn --arg value "$1" '$value | @uri')"
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/commits/${encoded_tag}" \
              --jq '.sha'
          }

          canonical_sha=""
          legacy_sha=""
          if tag_exists "$TAG"; then
            canonical_sha="$(resolve_tag_sha "$TAG")"
          fi
          if [ "$TAG" != "$LEGACY_TAG" ] && tag_exists "$LEGACY_TAG"; then
            legacy_sha="$(resolve_tag_sha "$LEGACY_TAG")"
          fi
          if [ -n "$canonical_sha" ] && [ -n "$legacy_sha" ] && [ "$canonical_sha" != "$legacy_sha" ]; then
            echo "::error::Canonical tag $TAG ($canonical_sha) and legacy tag $LEGACY_TAG ($legacy_sha) disagree."
            exit 1
          fi

          target_sha="${canonical_sha:-$legacy_sha}"
          if [ -z "$target_sha" ]; then
            # Walk only the trusted first-parent main history. The earliest
            # commit in the contiguous current-version segment is the unique
            # version-introduction target that later no-op commits may recover.
            target_sha="$CANDIDATE_SHA"
            previous_version=""
            while parent_sha="$(git rev-parse "${target_sha}^1" 2>/dev/null)"; do
              if ! parent_package="$(git show "${parent_sha}:package.json" 2>/dev/null)"; then
                break
              fi
              parent_version="$(node -e '
                let input = "";
                process.stdin.setEncoding("utf8");
                process.stdin.on("data", (chunk) => { input += chunk; });
                process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
              ' <<<"$parent_package")"
              if [ "$parent_version" != "$VERSION" ]; then
                previous_version="$parent_version"
                break
              fi
              target_sha="$parent_sha"
            done

            if [ -n "$previous_version" ]; then
              node --input-type=module - "$VERSION" "$previous_version" <<'NODE'
          import { compareSemVer } from "./scripts/release-policy.mjs";
          const [candidate, previous] = process.argv.slice(2);
          if (compareSemVer(candidate, previous) <= 0) {
            throw new Error(`Release version ${candidate} must be greater than first-parent version ${previous}`);
          }
          NODE
            fi
            echo "Recovered version-introduction target $target_sha for $VERSION."
          fi

          if [[ ! "$target_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release target is not a full commit SHA: $target_sha."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$target_sha" "$CANDIDATE_SHA"; then
            echo "::error::Release target $target_sha is not an ancestor of candidate $CANDIDATE_SHA."
            exit 1
          fi
          target_package="$(git show "${target_sha}:package.json")"
          target_version="$(node -e '
            let input = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { input += chunk; });
            process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
          ' <<<"$target_package")"
          if [ "$target_version" != "$VERSION" ]; then
            echo "::error::Target $target_sha contains package version $target_version, expected $VERSION."
            exit 1
          fi

          canonical_exists=false
          if [ -n "$canonical_sha" ]; then
            canonical_exists=true
          fi

          # A published canonical release with exactly the immutable package
          # asset is the durable completion marker. Draft, missing, legacy-only,
          # or malformed states are retried through the idempotent publisher.
          complete=false
          releases="$(gh api --method GET --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
            jq -c 'if length == 0 then [] else add end')"
          canonical_releases="$(jq -c --arg tag "$TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          legacy_releases="$(jq -c --arg tag "$LEGACY_TAG" '[.[] | select(.tag_name == $tag)]' <<<"$releases")"
          if [ "$(jq 'length' <<<"$canonical_releases")" -gt 1 ] || \
             [ "$(jq 'length' <<<"$legacy_releases")" -gt 1 ]; then
            echo "::error::Multiple releases use the canonical or legacy version identity."
            exit 1
          fi
          if [ "$TAG" != "$LEGACY_TAG" ] && \
             [ "$(jq 'length' <<<"$canonical_releases")" -gt 0 ] && \
             [ "$(jq 'length' <<<"$legacy_releases")" -gt 0 ]; then
            echo "::error::Both canonical and legacy releases exist for $VERSION; refusing ambiguous reconciliation."
            exit 1
          fi
          if [ "$canonical_exists" = true ] && [ "$(jq 'length' <<<"$canonical_releases")" -eq 1 ]; then
            expected_asset="lcv-ideas-software-ultrabrain-mcp-${VERSION}.tgz"
            if jq -e --arg name "$expected_asset" \
              '.[0].draft == false and
               ([.[0].assets[]? | select(
                 .name == $name and .state == "uploaded" and
                 ((.digest // "") | startswith("sha256:"))
               )] | length) == 1 and
               (.[0].assets | length) == 1' \
              <<<"$canonical_releases" >/dev/null; then
              complete=true
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "legacy_tag=$LEGACY_TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "canonical_exists=$canonical_exists" >> "$GITHUB_OUTPUT"
          echo "complete=$complete" >> "$GITHUB_OUTPUT"
          echo "Release identity $VERSION -> $TAG targets $target_sha (canonical_exists=$canonical_exists complete=$complete)."

      - name: Wait for exact-target always-on push gates
        if: steps.target.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
          CI_WORKFLOW_ID: "275133464"
          CODEQL_WORKFLOW_ID: "275518911"
          FORMAT_WORKFLOW_ID: "275133467"
          SOCKET_WORKFLOW_ID: "281151515"
          SCORECARD_WORKFLOW_ID: "275133471"
        run: |
          set -euo pipefail

          zizmor_workflow_json=""
          for attempt in {1..20}; do
            if zizmor_workflow_json="$(gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/zizmor.yml" 2>/dev/null)" && \
              jq -e '.path == ".github/workflows/zizmor.yml" and .state == "active"' \
                <<<"$zizmor_workflow_json" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "::error::The required Zizmor workflow is not active on the default branch."
              exit 1
            fi
            sleep 3
          done
          ZIZMOR_WORKFLOW_ID="$(jq -er '.id' <<<"$zizmor_workflow_json")"

          required_gates=(
            "$CI_WORKFLOW_ID:.github/workflows/ci.yml"
            "$CODEQL_WORKFLOW_ID:.github/workflows/codeql.yml"
            "$FORMAT_WORKFLOW_ID:.github/workflows/format-public.yml"
            "$SOCKET_WORKFLOW_ID:.github/workflows/socket.yml"
            "$SCORECARD_WORKFLOW_ID:.github/workflows/scorecard.yml"
            "$ZIZMOR_WORKFLOW_ID:.github/workflows/zizmor.yml"
          )
          for gate in "${required_gates[@]}"; do
            workflow_id="${gate%%:*}"
            expected_path="${gate#*:}"
            workflow_json="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_id")"
            if ! jq -e \
              --argjson workflow_id "$workflow_id" \
              --arg path "$expected_path" \
              '.id == $workflow_id and .path == $path and .state == "active"' \
              <<<"$workflow_json" >/dev/null; then
              echo "::error::Required workflow ID $workflow_id is not active at $expected_path."
              exit 1
            fi
          done

          deadline=$((SECONDS + 1200))
          gates_ready=false
          while [ "$SECONDS" -lt "$deadline" ]; do
            pages="$(gh api --method GET --paginate --slurp \
              "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$TARGET_SHA&event=push&per_page=100")"
            runs="$(jq -ce --arg sha "$TARGET_SHA" \
              '[.[].workflow_runs[] | select(.head_sha == $sha and .event == "push")]' \
              <<<"$pages")"

            observed_failures="$(jq -c '[.[] | select(
              .status == "completed" and
              .conclusion != "success" and
              .conclusion != "neutral" and
              .conclusion != "skipped"
            )]' <<<"$runs")"
            if [ "$(jq 'length' <<<"$observed_failures")" -gt 0 ]; then
              jq -r '.[] | "::error::Observed failing push workflow id=\(.workflow_id) name=\(.name) conclusion=\(.conclusion) url=\(.html_url)"' \
                <<<"$observed_failures"
              exit 1
            fi

            all_required_ready=true
            for gate in "${required_gates[@]}"; do
              workflow_id="${gate%%:*}"
              expected_path="${gate#*:}"
              gate_runs="$(jq -c \
                --argjson workflow_id "$workflow_id" \
                --arg path "$expected_path" \
                '[.[] | select(.workflow_id == $workflow_id and .path == $path and .head_branch == "main")]' \
                <<<"$runs")"
              terminal_non_success="$(jq '[.[] | select(.status == "completed" and .conclusion != "success")] | length' <<<"$gate_runs")"
              if [ "$terminal_non_success" -gt 0 ]; then
                jq -r '.[] | select(.status == "completed" and .conclusion != "success") |
                  "::error::Required gate id=\(.workflow_id) path=\(.path) concluded \(.conclusion): \(.html_url)"' \
                  <<<"$gate_runs"
                exit 1
              fi
              successful_runs="$(jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length' <<<"$gate_runs")"
              if [ "$successful_runs" -eq 0 ]; then
                all_required_ready=false
              fi
            done

            pending_observed="$(jq '[.[] | select(.status != "completed")] | length' <<<"$runs")"
            if [ "$all_required_ready" = true ] && [ "$pending_observed" -eq 0 ]; then
              echo "All six workflow-ID gates succeeded at immutable target $TARGET_SHA."
              gates_ready=true
              break
            fi
            echo "Waiting for exact-target push gates (observed=$(jq 'length' <<<"$runs") pending=$pending_observed)."
            sleep 15
          done

          if [ "$gates_ready" != true ]; then
            echo "::error::Timed out waiting for push gates at $TARGET_SHA."
            exit 1
          fi

      - name: Require zero results in exact-target CodeQL SARIF
        if: steps.target.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail

          analyses_ready=false
          for attempt in {1..12}; do
            pages="$(gh api --method GET --paginate --slurp \
              -H "Accept: application/vnd.github+json" \
              "repos/$GITHUB_REPOSITORY/code-scanning/analyses?per_page=100")"
            analyses="$(jq -c --arg sha "$TARGET_SHA" \
              '[.[][] | select(.commit_sha == $sha and .tool.name == "CodeQL")]' \
              <<<"$pages")"
            analyses_ready=true
            for category in "/language:actions" "/language:javascript-typescript"; do
              analysis="$(jq -c --arg category "$category" \
                '[.[] | select(.category == $category)] | sort_by(.id) | last // null' \
                <<<"$analyses")"
              if [ "$analysis" = null ]; then
                analyses_ready=false
                echo "Waiting for CodeQL analysis $category on $TARGET_SHA."
                continue
              fi
              analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
              if [ -n "$analysis_error" ]; then
                echo "::error::CodeQL analysis $category failed processing: $analysis_error"
                exit 1
              fi
            done
            if [ "$analyses_ready" = true ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Both exact-target CodeQL analyses did not become visible."
              exit 1
            fi
            sleep 5
          done

          for category in "/language:actions" "/language:javascript-typescript"; do
            analysis_id="$(jq -er --arg category "$category" \
              '[.[] | select(.category == $category)] | sort_by(.id) | last | .id' \
              <<<"$analyses")"
            sarif_file="$RUNNER_TEMP/codeql-${analysis_id}.sarif"
            gh api --method GET -H "Accept: application/sarif+json" \
              "repos/$GITHUB_REPOSITORY/code-scanning/analyses/$analysis_id" >"$sarif_file"
            result_count="$(jq '[.runs[]?.results[]?] | length' "$sarif_file")"
            if [ "$result_count" -ne 0 ]; then
              echo "::error::CodeQL $category contains $result_count result(s) for $TARGET_SHA."
              jq -r '.runs[]?.results[]? | [.ruleId, (.level // "warning"), .message.text] | @tsv' \
                "$sarif_file"
              exit 1
            fi
          done
          echo "Both exact-target CodeQL SARIF analyses contain zero results for $TARGET_SHA."

      - name: Require no unexpected exact-target Scorecard results
        if: steps.target.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail

          analyses_ready=false
          for attempt in {1..12}; do
            pages="$(gh api --method GET --paginate --slurp \
              -H "Accept: application/vnd.github+json" \
              "repos/$GITHUB_REPOSITORY/code-scanning/analyses?per_page=100")"
            analyses="$(jq -c --arg sha "$TARGET_SHA" \
              '[.[][] | select(
                .commit_sha == $sha and
                .ref == "refs/heads/main" and
                .tool.name == "Scorecard"
              )]' <<<"$pages")"

            unexpected_categories="$(jq '[.[].category] | unique |
              map(select(
                . != "supply-chain/local" and
                . != "supply-chain/online-scm" and
                . != "supply-chain/branch-protection"
              )) | length' <<<"$analyses")"
            if [ "$unexpected_categories" -ne 0 ]; then
              jq -r '.[].category' <<<"$analyses" | sort -u
              echo "::error::Scorecard produced an unreviewed analysis category for $TARGET_SHA."
              exit 1
            fi

            analyses_ready=true
            for category in \
              "supply-chain/local" \
              "supply-chain/online-scm" \
              "supply-chain/branch-protection"; do
              analysis="$(jq -c --arg category "$category" \
                '[.[] | select(.category == $category)] | sort_by(.id) | last // null' \
                <<<"$analyses")"
              if [ "$analysis" = null ]; then
                analyses_ready=false
                echo "Waiting for Scorecard analysis $category on $TARGET_SHA."
                continue
              fi
              analysis_error="$(jq -r '.error // ""' <<<"$analysis")"
              if [ -n "$analysis_error" ]; then
                echo "::error::Scorecard analysis $category failed processing: $analysis_error"
                exit 1
              fi
            done
            if [ "$analyses_ready" = true ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::All exact-target Scorecard analyses did not become visible."
              exit 1
            fi
            sleep 5
          done

          for category in \
            "supply-chain/local" \
            "supply-chain/online-scm" \
            "supply-chain/branch-protection"; do
            analysis_id="$(jq -er --arg category "$category" \
              '[.[] | select(.category == $category)] | sort_by(.id) | last | .id' \
              <<<"$analyses")"
            sarif_file="$RUNNER_TEMP/scorecard-${analysis_id}.sarif"
            gh api --method GET -H "Accept: application/sarif+json" \
              "repos/$GITHUB_REPOSITORY/code-scanning/analyses/$analysis_id" >"$sarif_file"
            unexpected_results="$(jq '[.runs[]?.results[]? | select(
              .ruleId != "MaintainedID" and
              .ruleId != "CodeReviewID" and
              .ruleId != "CIIBestPracticesID" and
              .ruleId != "FuzzingID" and
              .ruleId != "BranchProtectionID" and
              .ruleId != "TokenPermissionsID"
            )] | length' "$sarif_file")"
            if [ "$unexpected_results" -ne 0 ]; then
              echo "::error::Scorecard $category contains $unexpected_results unexpected result(s) for $TARGET_SHA."
              jq -r '.runs[]?.results[]? | [.ruleId, (.level // "warning"), .message.text] | @tsv' \
                "$sarif_file"
              exit 1
            fi
          done
          echo "Exact-target Scorecard has no result outside the six documented solo-maintainer/write-all governance exceptions."

      - name: Create canonical tag through the authenticated GitHub API
        if: >-
          steps.target.outputs.complete != 'true' &&
          steps.target.outputs.canonical_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target.outputs.tag }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail

          assert_target_on_main() {
            local main_sha comparison
            main_sha="$(gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
            comparison="$(gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/compare/${TARGET_SHA}...${main_sha}")"
            jq -e --arg target "$TARGET_SHA" \
              '(.status == "ahead" or .status == "identical") and .merge_base_commit.sha == $target' \
              <<<"$comparison" >/dev/null
          }

          resolve_tag_sha() {
            local encoded_tag
            encoded_tag="$(jq -rn --arg value "$TAG" '$value | @uri')"
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/commits/${encoded_tag}" --jq '.sha'
          }

          if ! assert_target_on_main; then
            echo "::error::Target $TARGET_SHA left main history before tag creation."
            exit 1
          fi
          create_error="$RUNNER_TEMP/create-tag-${GITHUB_RUN_ID}.err"
          if ! gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$TARGET_SHA" >/dev/null 2>"$create_error"; then
            existing_sha="$(resolve_tag_sha 2>/dev/null || true)"
            if [ "$existing_sha" != "$TARGET_SHA" ]; then
              cat "$create_error" >&2
              echo "::error::Tag creation failed and $TAG resolves to ${existing_sha:-missing}, not $TARGET_SHA."
              exit 1
            fi
            echo "Tag $TAG was created concurrently at the exact target; continuing idempotently."
          fi
          exact_sha="$(resolve_tag_sha)"
          if [ "$exact_sha" != "$TARGET_SHA" ]; then
            echo "::error::Canonical tag $TAG resolves to $exact_sha, expected $TARGET_SHA."
            exit 1
          fi
          echo "Canonical lightweight tag $TAG exists at immutable target $TARGET_SHA."

      - name: Dispatch idempotent publish workflow on the canonical tag
        if: steps.target.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target.outputs.tag }}
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail

          encoded_tag="$(jq -rn --arg value "$TAG" '$value | @uri')"
          tag_sha="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/commits/${encoded_tag}" --jq '.sha')"
          if [ "$tag_sha" != "$TARGET_SHA" ]; then
            echo "::error::Tag $TAG resolves to $tag_sha, expected $TARGET_SHA."
            exit 1
          fi
          main_sha="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          comparison="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/compare/${TARGET_SHA}...${main_sha}")"
          if ! jq -e --arg target "$TARGET_SHA" \
            '(.status == "ahead" or .status == "identical") and .merge_base_commit.sha == $target' \
            <<<"$comparison" >/dev/null; then
            echo "::error::Target $TARGET_SHA left main history before publish dispatch."
            exit 1
          fi

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/publish.yml/dispatches" \
            -f ref="$TAG"
          echo "Dispatched publish.yml on canonical protected tag $TAG at $TARGET_SHA."
    timeout-minutes: 30
