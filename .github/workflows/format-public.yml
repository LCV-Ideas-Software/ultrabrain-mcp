name: Public Format
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions: write-all
env:
  # StepSecurity Secure Registry auth for `npm ci`/`npm install` per project .npmrc.
  # Token is the StepSecurity API key with proxy read scope; never used for publish.
  STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
jobs:
  prettier-public:
    permissions: write-all
    name: Check index.html formatting
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Check public page formatting
        run: npm run format:public:check
    timeout-minutes: 15
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
