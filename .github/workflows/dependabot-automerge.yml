name: Dependabot Automerge

on:
  workflow_run:
    workflows:
      - CI
      - CodeQL
      - Dependency Review
      - Public Format
      - Socket Security
      - OpenSSF Scorecard
      - Zizmor
    types:
      - completed
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions: write-all

jobs:
  dependabot-automerge:
    name: Process Dependabot pull requests
    runs-on: ubuntu-latest
    permissions: write-all
    environment: dependabot-automation
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: |
            api.github.com:443

      - name: Process one guarded queue mutation
        uses: LCV-Ideas-Software/.github/dependabot-automerge@c846bc77cbeb38dcf5fb4b8c798dc75227b65f04
        with:
          github_token: ${{ github.token }}
          automation_token: ${{ secrets.LCV_AUTOMATION_TOKEN }}
          required_checks_json: '[{"name":"Dependency Review","app_id":15368},{"name":"Check index.html formatting","app_id":15368},{"name":"CodeQL","app_id":57789},{"name":"Socket Security: Project Report","app_id":156372},{"name":"Install, check and smoke (ubuntu-latest, 22)","app_id":15368},{"name":"Install, check and smoke (ubuntu-latest, 24)","app_id":15368},{"name":"Install, check and smoke (windows-latest, 22)","app_id":15368},{"name":"Install, check and smoke (windows-latest, 24)","app_id":15368},{"name":"zizmor","app_id":57789}]'

concurrency:
  group: dependabot-automerge-${{ github.repository }}
  queue: max
  cancel-in-progress: false
