name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions: write-all
env:
  # StepSecurity Secure Registry auth for `npm ci`/`npm install` per project .npmrc.
  # Token is the StepSecurity API key with proxy read scope; never used for publish.
  STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
jobs:
  verify:
    permissions: write-all
    name: Install, check and smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Exercise the primary Windows deployment host and the declared Node engines floor.
        os: [ubuntu-latest, windows-latest]
        node-version: [22, 24]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Biome (lint + format)
        run: npm run biome
      - name: Verify
        run: npm test
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  queue: max
  cancel-in-progress: false
