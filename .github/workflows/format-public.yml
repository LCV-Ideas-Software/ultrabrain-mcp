name: Public Format
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
env:
  # StepSecurity Secure Registry auth for `npm ci`/`npm install` per project .npmrc.
  # Token is the StepSecurity API key with proxy read scope; never used for publish.
  STEPSECURITY_NPM_TOKEN: ${{ secrets.STEPSECURITY_NPM_TOKEN }}
jobs:
  prettier-public:
    name: Check index.html formatting
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - name: Setup Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Check public page formatting
        run: npm run format:public:check
    timeout-minutes: 15
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
